name: flutter_rs_ffi_barrage
description: A high-performance Flutter barrage plugin powered by Rust FFI via flutter_rust_bridge.
version: 1.0.0
publish_to: 'none'
repository: https://github.com/HDYOU/flutter_rs_ffi_barrage
issue_tracker: https://github.com/HDYOU/flutter_rs_ffi_barrage/issues

environment:
  sdk: '>=3.7.0 <4.0.0'
  flutter: '>=3.41.0'

dependencies:
  flutter:
    sdk: flutter
  rust_lib_flutter_rs_ffi_barrage:
    path: rust_builder
  flutter_rust_bridge: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter_rust_bridge:
  rust_input: crate::api
  rust_root: native/rs_core/
  dart_output: lib/src/rust
