# Description: Rust 代码质量校验与测试工作流
# 对 native/rs_core 下的 Rust 代码执行格式化检查、静态分析、单元测试及多平台交叉编译验证

name: Rust CI

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - 'native/rs_core/**'
      - '.github/workflows/rust_ci.yml'
  pull_request:
    branches: [ main, master, develop ]
    paths:
      - 'native/rs_core/**'
      - '.github/workflows/rust_ci.yml'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Rust 代码质量检查与单元测试
  # ---------------------------------------------------------------------------
  rust-lint-test:
    name: Rust Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: native/rs_core

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 安装 Rust 稳定版工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: 缓存 Cargo Registry 与 Target 目录
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            native/rs_core/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('native/rs_core/Cargo.lock', 'native/rs_core/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: 格式化校验 (cargo fmt --check)
        run: cargo fmt --all -- --check
        continue-on-error: false

      - name: 静态代码检查 (cargo clippy)
        run: cargo clippy --all-targets --all-features -- -D warnings
        continue-on-error: false

      - name: 单元测试 (cargo test)
        run: cargo test --all-features -- --nocapture
        continue-on-error: false

      - name: Benchmark 编译验证 (cargo bench --no-run)
        run: cargo bench --no-run
        continue-on-error: false

  # ---------------------------------------------------------------------------
  # Job 2: 多平台交叉编译验证
  # ---------------------------------------------------------------------------
  rust-cross-compile-check:
    name: Cross Compile - ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: rust-lint-test
    defaults:
      run:
        working-directory: native/rs_core

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact_ext: .so
          - target: aarch64-unknown-linux-gnu
            artifact_ext: .so
          - target: x86_64-pc-windows-msvc
            artifact_ext: .dll
          - target: aarch64-apple-darwin
            artifact_ext: .dylib
          - target: x86_64-apple-darwin
            artifact_ext: .dylib

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 安装 Rust 稳定版工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 缓存 Cargo Registry 与 Target 目录
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            native/rs_core/target/
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('native/rs_core/Cargo.lock', 'native/rs_core/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-
            ${{ runner.os }}-cargo-

      - name: 安装交叉编译依赖 (aarch64-linux-gnu)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "[target.aarch64-unknown-linux-gnu]" >> ~/.cargo/config.toml
          echo "linker = \"aarch64-linux-gnu-gcc\"" >> ~/.cargo/config.toml

      - name: 安装交叉编译依赖 (x86_64-pc-windows-msvc)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64
          echo "[target.x86_64-pc-windows-msvc]" >> ~/.cargo/config.toml
          echo "linker = \"x86_64-w64-mingw32-gcc\"" >> ~/.cargo/config.toml

      - name: 安装交叉编译依赖 (Apple Darwin)
        if: contains(matrix.target, 'apple-darwin')
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm-dev libxml2-dev
          echo "[target.${{ matrix.target }}]" >> ~/.cargo/config.toml
          echo "linker = \"clang\"" >> ~/.cargo/config.toml
          echo "rustflags = [\"-C\", \"link-arg=-undefined\", \"-C\", \"link-arg=dynamic_lookup\"]" >> ~/.cargo/config.toml

      - name: 交叉编译 (cargo build --release)
        run: cargo build --release --target ${{ matrix.target }}
        continue-on-error: false

      - name: 验证 cdylib 产物存在
        shell: bash
        run: |
          TARGET_DIR="target/${{ matrix.target }}/release"
          LIB_NAME="libflutter_rs_ffi_barrage"
          EXT="${{ matrix.artifact_ext }}"
          
          if [ "${{ matrix.target }}" = "x86_64-pc-windows-msvc" ]; then
            LIB_NAME="flutter_rs_ffi_barrage"
          fi
          
          ARTIFACT="${TARGET_DIR}/${LIB_NAME}${EXT}"
          
          if [ -f "$ARTIFACT" ]; then
            echo "产物验证通过: $ARTIFACT"
            ls -lh "$ARTIFACT"
          else
            echo "错误: 未找到 cdylib 产物 $ARTIFACT"
            echo "目录内容:"
            ls -la "$TARGET_DIR/"
            exit 1
          fi
